{% extends 'base.html' %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-sm border-0 p-4">

                <h2 class="fw-bold mb-4">
                    Upload Payment Proof
                </h2>

                <form method="POST"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Transfer Receipt
                        </label>

                        <input
                            type="file"
                            name="payment_proof"
                            class="form-control"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-dark">

                        Submit Payment

                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

{% endblock %}
